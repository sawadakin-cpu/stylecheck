<script>
    jQuery(function () {
        jQuery.ajax({
            type: 'GET',
            url: 'https://script.google.com/macros/s/AKfycbwiiuSBQ2VaAw_tR0Im1GucOTNSYeQDQ3t5nrS6H95jwXFmGzbB1vbHP-7CfCr_XVhm/exec', // ← ここにJSONのURLを入力
            dataType: 'json',
            async: false,
        }).then(function (json) {
            console.dir(json);

            function formatLocalDate(utcString) {
                const date = new Date(utcString);
                const year = date.getFullYear();
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                const day = date.getDate().toString().padStart(2, '0');
                return `${year}/${month}/${day}`;
            }

            var cell = json.filter(({ type }) => type == 'wave').reverse();

            const urlParams = new URLSearchParams(window.location.search);
            const acdValue = urlParams.get("acd");
            let urlDateStr = null;

            if (acdValue) {
                const dateMatch = acdValue.match(/^(\d{6})/);
                if (dateMatch) {
                    const yyMMdd = dateMatch[1];
                    const year = parseInt(yyMMdd.substr(0, 2), 10) + 2000;
                    const month = yyMMdd.substr(2, 2);
                    const day = yyMMdd.substr(4, 2);
                    urlDateStr = `${year}/${month}/${day}`;
                }
            }

            const now = new Date();

            for (let i = 0; i < cell.length; i++) {
                const item = cell[i];
                if (item && item.date) {
                    if (!item.URL || item.URL.trim() === "") continue;

                    const dateStr = formatLocalDate(item.date);

                    if (urlDateStr && dateStr === urlDateStr) continue;

                    const itemDate = new Date(item.date);
                    itemDate.setHours(12, 0, 0, 0); // 昼12時固定
                    if (itemDate > now) continue;

                    const publishDateTime = `${item.date} 12:00:00`;

                    jQuery('ul.archive_slides').append(
                        '<li class="timer" data-start-date="' + publishDateTime + '">' +
                        '<a href="' + item.URL + '">' +
                        '<img src="' + item.banner + '" alt="">' +
                        '<p class="date">' + dateStr + '</p>' +
                        '<p class="title">' + item.title + '</p>' +
                        '</a></li>'
                    );
                }
            }

            // ✅ 最大6件まで表示（start-dateの新しい順）
            const timerItems = jQuery('ul.archive_slides li.timer');
            const sortedTimers = timerItems.toArray().sort((a, b) => {
                const dateA = new Date(jQuery(a).attr('data-start-date'));
                const dateB = new Date(jQuery(b).attr('data-start-date'));
                return dateB - dateA; // 新しい順
            });

            sortedTimers.forEach((el, index) => {
                if (index < 6) {
                    jQuery(el).show();
                } else {
                    jQuery(el).hide(); // または .remove()
                }
            });

            // --- flexslider ---
            function getItemWidth() {
                const containerWidth = jQuery('.flexslider').width();
                return Math.floor((containerWidth - 20) / 2); // 2枚表示
            }

            function positionNavButtons() {
                const $slider = jQuery('.flexslider');
                const $image = $slider.find('.slides li img').first();
                const $prev = $slider.find('.flex-prev');
                const $next = $slider.find('.flex-next');

                if ($image.length && $prev.length && $image[0].complete) {
                    const imgHeight = $image.height();
                    const btnHeight = $prev.height();
                    const topPos = (imgHeight - btnHeight) / 2;

                    $prev.css('top', topPos + 'px');
                    $next.css('top', topPos + 'px');
                }
            }

            jQuery('.flexslider').flexslider({
                animation: "slide",
                slideshowSpeed: 3000,
                controlNav: true,
                directionNav: true,
                animationLoop: false,
                slideshow: false,
                itemWidth: getItemWidth(),
                itemMargin: 10,
                minItems: 2,
                maxItems: 2,
                start: function () {
                    positionNavButtons();
                }
            });

            jQuery(window).on('resize', function () {
                const flex = jQuery('.flexslider').data('flexslider');
                if (flex) {
                    flex.vars.itemWidth = getItemWidth();
                    flex.doMath();
                    flex.update();
                }
                positionNavButtons();
            });

            jQuery(window).on('load', positionNavButtons);
        });
    });
</script>
