name: Update CMS Data

on:
  schedule:
    - cron: "0 3 * * 1" # 毎週月曜 12:00 JST
  workflow_dispatch:
  repository_dispatch:
    types: [cms-updated]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch microCMS data
        run: |
          curl -s \
            -H "X-MICROCMS-API-KEY: ${{ secrets.MICROCMS_API_KEY }}" \
            "https://stylecheck.microcms.io/api/v1/stylecheck?limit=20&orders=-start" \
            -o data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || (git commit -m "Update data.json" && git pull --rebase && git push)
